<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <title>Skibidi Clicker</title>
        <link rel="stylesheet" href="playscreen.css">
    </head>
    <body>
        <div id="ru">
            <h2>Are you sure?</h2>
            <button id="y" class="ui">Yes</button>
            <button id="n" class="ui">Cancel</button>
        </div>

        <header>
            <button id="dark"><svg class="moon" id="drkim" width="24" height="24" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 109.79 9.79z" /></svg></button><h1>Skibidi Clicker</h1>
            <p>By MEtimebroo on GitHub</p>
        </header>

        <h3>Skibs: <span id="score">0</span></h3>
        <h3 id="puh">Per Sec: <span id="per">0</span></h3>

        <button id="plus" class="but"><img src="skibidi_toilet.webp" id="plu" class="thi"></button>

        <div id="butdiv">
            <div id="butleft">
                <button id="one" class="but"><img src="skibidi_toilet_oneper.png" id="o" class="thi"><br>Cost: <span id="uno">10</span><br>Reward: <span id="unr">0.1</span><br>Owned: <span id="on">0</span></button>
                <button id="five" class="but"><img src="cameraman.webp" id="f" class="thi"><br>Cost: <span id="cinco">175</span><br>Reward: <span id="fivr">1</span><br>Owned: <span id="onf">0</span></button>
                <button id="ten" class="but"><img src="speakerman.webp" id="t" class="thi"><br>Cost: <span id="diez">1500</span><br>Reward: <span id="tenr">10</span><br>Owned: <span id="ont">0</span></button>
            </div>

            <div id="butright">
                <button id="three" class="but"><img src="astro_toilet_1.webp" id="th" class="thi"><br>Cost: <span id="treinta">15000</span><br>Reward: <span id="thr">100</span><br>Owned: <span id="onth">0</span></button>
                <button id="six" class="but"><img src="titan_tv_man_1.webp" id="s" class="thi"><br>Cost: <span id="sesenta">163940</span><br>Reward: <span id="sixr">1000</span><br>Owned: <span id="ons">0</span></button>
                <button id="twelve" class="but"><img src="titan_speakerman.webp" id="tw" class="thi"><br>Cost: <span id="ciento-vente">10485860</span><br>Reward: <span id="twelvr">10000</span><br> Owned: <span id="ontw">0</span></button>
            </div>
        </div>

        <div id="updiv">
            <button id="up" class="up"><img src="IMG_0411.webp" id="upim" class="thi"><br>2 Ply<br>Twice the layers, twice the power.<br>100 Skibs</button>
            <button id="up1" class="up"><img src="IMG_0416.webp" id="upim1" class="thi"><br>4 Ply<br>Quadruple layers?! Imagine the power!<br>500 Skibs</button>
            <button id="up2" class="up"><img src="IMG_0413.webp" id="upim2" class="thi"><br>50-100mm Lens<br>Twice the zoom for Cameraman.<br>1000 Skibs</button>
        </div>

        <button id="reset" type="button" class="ui">Reset</button>
        
        <p class="ver">v1.7.12-beta</p>

        <script src="playscreen.js"></script>
    </body>
</html>
